id: engineer-code-review
profile: engineer
agent: pi
launcher: outfitter

# The fixture project plants one deliberate smell: applyGuestDiscount is a
# copy-paste of applyMemberDiscount that silently diverged — it floors the
# discounted total instead of rounding to cents, so guests are undercharged
# by up to a cent per checkout relative to the intended rounding.
# "Finding the defect" (requirement 14) means review.md names
# applyGuestDiscount AND mentions the duplication or the floor/rounding
# divergence — hence the two matches assertions below.
workflow:
  timeout_seconds: 1200
  prompt: |
    Review the code in this checkout service for bugs and code smells. Write
    your findings to review.md, one finding per section, naming the file and
    function for each finding and explaining the impact.

outputs:
  - path: review.md
    assertions:
      - kind: exists
      - kind: matches
        pattern: 'applyGuestDiscount'
      - kind: matches
        pattern: 'duplicat|copy.?past|floor|round'

matrix:
  base_profile: engineer
  repeat: 3
  variants:
    - id: baseline
    - id: review-system-prompt
      overrides:
        controls:
          append_system_prompt:
            - |
              You are performing a rigorous code review. Hunt specifically for
              duplicated logic that has silently diverged, numeric edge cases,
              and mutable shared state.
    - id: no-subagents
      overrides:
        controls:
          subagents: false
