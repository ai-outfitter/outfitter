# Temporary diagnostic for ai-outfitter/actions#19: probe each GitHub Models
# endpoint variant with the workflow's own GITHUB_TOKEN and report status
# codes. Delete after the investigation concludes.
name: Probe GitHub Models endpoints
on:
  workflow_dispatch: {}

permissions:
  models: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe endpoints
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          payload_prefixed='{"model":"openai/gpt-4.1-mini","messages":[{"role":"user","content":"Say ok"}],"max_tokens":5}'
          payload_plain='{"model":"gpt-4.1-mini","messages":[{"role":"user","content":"Say ok"}],"max_tokens":5}'
          probe() {
            local name="$1" url="$2" payload="$3"
            echo "=== $name ($url)"
            curl -sS -o /tmp/resp.json -w "HTTP %{http_code}\n" \
              -X POST "$url" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$payload" || true
            head -c 400 /tmp/resp.json; echo; echo
          }
          probe "new gateway"        "https://models.github.ai/inference/chat/completions" "$payload_prefixed"
          probe "org-scoped gateway" "https://models.github.ai/orgs/ai-outfitter/inference/chat/completions" "$payload_prefixed"
          probe "legacy endpoint"    "https://models.inference.ai.azure.com/chat/completions" "$payload_plain"
