# Temporary diagnostic for ai-outfitter/actions#19, round 3: the raw Copilot
# API and the copilot_internal/v2/token exchange both reject the Actions
# GITHUB_TOKEN, so the only documented zero-PAT path is Copilot CLI itself
# (changelog 2026-07-02). Run it headless with the workflow token to see if
# it works in this org (requires the "Copilot CLI billed to the organization"
# policy). Delete after the investigation concludes.
name: Probe Copilot API with GITHUB_TOKEN
on:
  workflow_dispatch: {}

permissions:
  copilot-requests: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install Copilot CLI
        run: npm install -g @github/copilot && copilot --version

      - name: Run Copilot CLI headless with workflow token
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          copilot -p "Reply with exactly: ok" --allow-all-tools --log-level debug 2>&1 | tail -30
          echo "exit=$?"
