name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    name: Publish CLI npm package
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync release version
        run: node scripts/sync-release-version.mjs "${GITHUB_REF_NAME}"

      - name: Format synchronized release metadata
        run: npm exec -- prettier --write package.json package-lock.json code/cli/package.json

      - name: Run CI checks
        run: npm run check-ci

      - name: Build package
        run: npm run build

      - name: Publish package to npm
        run: npm publish --workspace @ai-outfitter/outfitter --access public --provenance

  publish-docker:
    needs: publish-npm
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/container.yml
    with:
      version: ${{ github.ref_name }}
      publish: true
      prerelease: ${{ github.event.release.prerelease }}
    secrets: inherit
