name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    name: Publish CLI npm package
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26.4.0'
          registry-url: https://registry.npmjs.org/

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync release version
        run: bun scripts/sync-release-version.ts "${GITHUB_REF_NAME}"

      - name: Refresh lockfile for synchronized versions
        run: bun install

      - name: Format synchronized release metadata
        run: bunx biome format --write package.json code/cli/package.json

      - name: Run CI checks
        run: bun run check-ci

      - name: Build package
        run: bun run build

      - name: Publish package to npm
        run: npm publish --workspace @ai-outfitter/outfitter --access public --provenance
